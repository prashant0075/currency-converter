<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <!-- this is main container -->
    <div class="main-container">
        
        <form action="submit">
            <h2 >Exchange</h2>
            <input type="text">
            <div class="select-container">
                
                <img  src="https://flagsapi.com/IN/flat/64.png" id="fromImg">
                <select name="" id="fromCurr" class="select">
                    <option value="IN" selected>INR</option>
                </select>

                <i class="fa-solid fa-arrow-right-arrow-left"></i>

                <img src="https://flagsapi.com/US/flat/64.png" id="toImg">
                <select name="" id="toCurr" class="select">
                    <option value="US">USD</option>
                </select>
                    
                
            </div>
            <div class="msg">
                <p>Your Amount Is</p>
            </div>
            <button id="btn">Get Exchange</button>
        </form>
    </div>
    <script src="codes.js"></script>
    <script src="app.js"></script>
    
</body>
</html>
